<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiền Lê Garden — Farmstay Buôn Ma Thuột</title>
  <meta name="description" content="Hiền Lê Garden Farmstay — Check-in thiên nhiên, view hồ cực chill. Bình yên giữa lòng thành phố Buôn Ma Thuột.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       DESIGN SYSTEM — CSS CUSTOM PROPERTIES
    ============================================ */
    :root {
      --bg-primary: #0D1F13;
      --bg-secondary: #111D15;
      --bg-surface: #172A1C;
      --bg-card: #1A2E1F;
      --accent-gold: #C9A84C;
      --accent-gold-lt: #E8C96A;
      --accent-emerald: #10B981;
      --accent-emerald-dk: #059669;
      --text-primary: #F5F5EF;
      --text-muted: #9CA3AF;
      --text-dim: #6B7280;
      --border-gold: rgba(201,168,76,0.3);
      --border-subtle: rgba(255,255,255,0.07);
      --overlay: rgba(13,31,19,0.55);

      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;

      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 2rem;
      --spacing-lg: 4rem;
      --spacing-xl: 8rem;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;

      --transition: 0.3s ease;
      --transition-slow: 0.6s ease;
    }

    /* ============================================
       BASE RESET
    ============================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: var(--font-sans);
      cursor: pointer;
      border: none;
      background: none;
    }

    /* ============================================
       TYPOGRAPHY UTILITIES
    ============================================ */
    .serif { font-family: var(--font-serif); }
    .gold { color: var(--accent-gold); }
    .emerald { color: var(--accent-emerald); }
    .muted { color: var(--text-muted); }

    .label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-gold);
    }

    /* ============================================
       SCROLL ANIMATION BASE
    ============================================ */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ============================================
       SECTION LAYOUT
    ============================================ */
    .section {
      padding: var(--spacing-xl) var(--spacing-md);
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--spacing-md);
    }

    .section-header {
      text-align: center;
      margin-bottom: var(--spacing-lg);
    }

    .section-header h2 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      font-style: italic;
      color: var(--text-primary);
      line-height: 1.2;
      margin-top: var(--spacing-xs);
    }

    /* ============================================
       BUTTON SYSTEM
    ============================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
    }

    .btn-gold {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }
    .btn-gold:hover {
      background: var(--accent-gold-lt);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.3);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .btn-outline:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      transform: translateY(-2px);
    }

    .btn-emerald {
      background: transparent;
      color: var(--accent-emerald);
      border: 1px solid var(--accent-emerald);
    }
    .btn-emerald:hover {
      background: var(--accent-emerald);
      color: var(--bg-primary);
      transform: translateY(-2px);
    }

    /* ============================================
       NAVIGATION
    ============================================ */
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 1.25rem var(--spacing-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background var(--transition), backdrop-filter var(--transition), padding var(--transition);
    }

    #navbar.scrolled {
      background: rgba(13,31,19,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0.875rem var(--spacing-md);
      border-bottom: 1px solid var(--border-gold);
    }

    .nav-logo {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--accent-gold);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .nav-logo span {
      display: block;
      font-size: 0.55rem;
      font-style: normal;
      font-family: var(--font-sans);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color var(--transition);
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent-gold);
      transition: width var(--transition);
    }

    .nav-links a:hover {
      color: var(--accent-gold);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-cta {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-emerald);
      border: 1px solid var(--accent-emerald);
      padding: 0.6rem 1.4rem;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
    }

    .nav-cta:hover {
      background: var(--accent-emerald);
      color: var(--bg-primary);
    }

    /* Hamburger - mobile */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }
    .nav-hamburger span {
      display: block;
      width: 24px;
      height: 1.5px;
      background: var(--text-primary);
      transition: all var(--transition);
    }

    /* Mobile overlay menu */
    .nav-mobile-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,31,19,0.97);
      z-index: 999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    .nav-mobile-overlay.open {
      display: flex;
    }
    .nav-mobile-overlay a {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-style: italic;
      color: var(--text-primary);
      transition: color var(--transition);
    }
    .nav-mobile-overlay a:hover { color: var(--accent-gold); }
    .nav-mobile-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 1.5rem;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      color: var(--text-primary);
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-cta-desktop { display: none; }
      .nav-hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <nav id="navbar">
    <a href="#home" class="nav-logo">
      Hiền Lê Garden
      <span>Farmstay · Buôn Ma Thuột</span>
    </a>

    <ul class="nav-links">
      <li><a href="#overview">Tổng Quan</a></li>
      <li><a href="#rooms">Phòng</a></li>
      <li><a href="#experience">Trải Nghiệm</a></li>
      <li><a href="#pricing">Bảng Giá</a></li>
      <li><a href="#contact">Liên Hệ</a></li>
    </ul>

    <a href="tel:0968987311" class="nav-cta nav-cta-desktop">Đặt Phòng Ngay</a>

    <button class="nav-hamburger" id="navHamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile Overlay -->
  <div class="nav-mobile-overlay" id="mobileOverlay">
    <button class="nav-mobile-close" id="mobileClose">✕</button>
    <a href="#overview" class="mobile-nav-link">Tổng Quan</a>
    <a href="#rooms" class="mobile-nav-link">Phòng</a>
    <a href="#experience" class="mobile-nav-link">Trải Nghiệm</a>
    <a href="#pricing" class="mobile-nav-link">Bảng Giá</a>
    <a href="#contact" class="mobile-nav-link">Liên Hệ</a>
    <a href="tel:0968987311" class="btn btn-emerald">📞 0968 987 311</a>
  </div>

  <!-- SECTIONS WILL BE ADDED HERE IN SUBSEQUENT TASKS -->

  <script>
    // Nav scroll effect
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 80);
    });

    // Mobile menu
    const hamburger = document.getElementById('navHamburger');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const mobileClose = document.getElementById('mobileClose');

    hamburger.addEventListener('click', () => mobileOverlay.classList.add('open'));
    mobileClose.addEventListener('click', () => mobileOverlay.classList.remove('open'));
    document.querySelectorAll('.mobile-nav-link').forEach(link => {
      link.addEventListener('click', () => mobileOverlay.classList.remove('open'));
    });
  </script>
</body>
</html>
