<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiền Lê Garden — Farmstay Buôn Ma Thuột</title>
  <meta name="description" content="Hiền Lê Garden Farmstay — Check-in thiên nhiên, view hồ cực chill. Bình yên giữa lòng thành phố Buôn Ma Thuột.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       DESIGN SYSTEM — CSS CUSTOM PROPERTIES
    ============================================ */
    :root {
      --bg-primary: #0D1F13;
      --bg-secondary: #111D15;
      --bg-surface: #172A1C;
      --bg-card: #1A2E1F;
      --accent-gold: #C9A84C;
      --accent-gold-lt: #E8C96A;
      --accent-emerald: #10B981;
      --accent-emerald-dk: #059669;
      --text-primary: #F5F5EF;
      --text-muted: #9CA3AF;
      --text-dim: #6B7280;
      --border-gold: rgba(201,168,76,0.3);
      --border-subtle: rgba(255,255,255,0.07);
      --overlay: rgba(13,31,19,0.55);

      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;

      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 2rem;
      --spacing-lg: 4rem;
      --spacing-xl: 8rem;

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;

      --transition: 0.3s ease;
      --transition-slow: 0.6s ease;
    }

    /* ============================================
       BASE RESET
    ============================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: var(--font-sans);
      cursor: pointer;
      border: none;
      background: none;
    }

    /* ============================================
       TYPOGRAPHY UTILITIES
    ============================================ */
    .serif { font-family: var(--font-serif); }
    .gold { color: var(--accent-gold); }
    .emerald { color: var(--accent-emerald); }
    .muted { color: var(--text-muted); }

    .label {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-gold);
    }

    /* ============================================
       SCROLL ANIMATION BASE
    ============================================ */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ============================================
       SECTION LAYOUT
    ============================================ */
    .section {
      padding: var(--spacing-xl) var(--spacing-md);
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--spacing-md);
    }

    .section-header {
      text-align: center;
      margin-bottom: var(--spacing-lg);
    }

    .section-header h2 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      font-style: italic;
      color: var(--text-primary);
      line-height: 1.2;
      margin-top: var(--spacing-xs);
    }

    /* ============================================
       BUTTON SYSTEM
    ============================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
    }

    .btn-gold {
      background: var(--accent-gold);
      color: var(--bg-primary);
    }
    .btn-gold:hover {
      background: var(--accent-gold-lt);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.3);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .btn-outline:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      transform: translateY(-2px);
    }

    .btn-emerald {
      background: transparent;
      color: var(--accent-emerald);
      border: 1px solid var(--accent-emerald);
    }
    .btn-emerald:hover {
      background: var(--accent-emerald);
      color: var(--bg-primary);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  </script>
</body>
</html>
